# קובץ ה-docker-compose. משמש כ-"מנהל פרוייקטים". אחראי על תפעול הקונטיינרים בתכונית


services: # ריכוז הקונטיינרים
  app: # קונטיינר ראשון שיש לנו - קונטיינר האפליקציה
    build: ./app # פקודה האומרת לדוקר "לך לתיקייה הזאת ותבנה את ה-Image לפי ה-Dockerfile שיש שם"
    env_file: # ביצוע טעינת משתני סביבה (כמו שם המשתמש) מקובץ ספציפי
      - .env
    volumes: # מה שמהווה ה"זיכרון המשותף" בין הדוקר למחשב. לשניהם תהיה גישה לקובץ הזה (המקרר)
      - ./inventory.txt:/data/inventory.txt
      - ./recipes.json:/data/recipes.json
    expose: # בתוך הרשת הפנימית של דוקר, זה הפורט שיוקצה וככה הפרוקסי יוכל לתקשר עם האפליקציה
      - "5000"

  proxy: # קונטיינר שני שיש לנו - קונטיינר הפרוקסי (קונטיינר מוכן שייבאנו מבחוץ)
    image: nginx:alpine # דוקר לא בונה image, אלא הוא מוריד אחד מוכן של שרת הפרוקסי
    ports: # קשור לחשיפה לבחוץ. צד שמאל זה המחשב וצד ימין זה הקונטיינר. כל מי שיפנה למחשב בפורט 80 יגיע לקונטייר הזה
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf # דורס את הגדרות ברירת המחדל שלו עם מה שאנחנו הגדרנו
      - ./dashboard:/usr/share/nginx/html # מחבר את תיקיית Dashboard לתיקייה שבה הפרוקסי מחפש קבצי אינטרנט להצגה - בקיצור מקשר את התיקייה עם ה-HTML לפרוקסי
    depends_on: # סדר פעולות. אומר לדוקר "אל תפעיל את הפרוקסי לפני שהאפליקציה עלתה ועבדה"
      - app